<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Homework</title>

<style>
body {
    background-color: #eee;
    font-family: "Times New Roman";
    padding: 30px;
}

/* heading 1 */
.h1 {
    font-size: 40px;
    font-weight: bold;
    text-decoration: overline;
    text-shadow: 2px 2px red;
}

/* heading 2 */
.h2 {
    font-size: 28px;
    font-style: italic;
    border: 3px solid black;
    outline: 5px solid yellow;
    padding: 10px;
    margin-top: 20px;
}

/* heading 3 */
.h3 {
    font-size: 24px;
    text-decoration: underline;
    text-align: right;
    margin-top: 30px;
}
</style>

</head>

<body>

<div class="h1">This is heading 1</div>

<div class="h2">This is heading 2</div>

<div class="h3">This is heading 3</div>

</body>
</html>
